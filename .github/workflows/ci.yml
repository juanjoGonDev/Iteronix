name: CI

on:
  push:
    branches:
      - master
      - codex/**
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.18.3
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -C apps/web-ui exec puppeteer browsers install chrome --install-deps
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      - run: pnpm -C apps/web-ui validate:source-linking
      - run: pnpm -C apps/web-ui validate:quality-gates
      - run: pnpm eval:min
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: web-ui-browser-validation-screenshots
          path: apps/web-ui/screenshots/
          if-no-files-found: ignore
